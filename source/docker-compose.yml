services:

  # ─── Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seismic
      POSTGRES_USER: seismic
      POSTGRES_PASSWORD: seismic123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seismic -d seismic"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  # ─── Broker (fan-out, neutral region) ───────────────────────
  broker:
    build: ./broker
    environment:
      SIMULATOR_URL: http://host.docker.internal:8080
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:9000/health', timeout=3); sys.exit(0)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Processing Replicas (subject to failure) ───────────────
  processor-1:
    build: ./processor
    environment:
      REPLICA_ID: processor-1
      BROKER_URL: ws://broker:9000/ws/subscribe
      SIMULATOR_URL: http://host.docker.internal:8080
      DATABASE_URL: postgresql://seismic:seismic123@postgres:5432/seismic
      WINDOW_SIZE: "128"
      SAMPLING_RATE_HZ: "20"
      ANALYZE_EVERY: "32"
      MIN_ANALYSIS_FREQ_HZ: "0.5"
      AMPLITUDE_THRESHOLD: "0.01"
      SNR_THRESHOLD: "1.2"
      TIME_BUCKET_SECONDS: "5"
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    restart: always

  processor-2:
    build: ./processor
    environment:
      REPLICA_ID: processor-2
      BROKER_URL: ws://broker:9000/ws/subscribe
      SIMULATOR_URL: http://host.docker.internal:8080
      DATABASE_URL: postgresql://seismic:seismic123@postgres:5432/seismic
      WINDOW_SIZE: "128"
      SAMPLING_RATE_HZ: "20"
      ANALYZE_EVERY: "32"
      MIN_ANALYSIS_FREQ_HZ: "0.5"
      AMPLITUDE_THRESHOLD: "0.01"
      SNR_THRESHOLD: "1.2"
      TIME_BUCKET_SECONDS: "5"
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    restart: always

  processor-3:
    build: ./processor
    environment:
      REPLICA_ID: processor-3
      BROKER_URL: ws://broker:9000/ws/subscribe
      SIMULATOR_URL: http://host.docker.internal:8080
      DATABASE_URL: postgresql://seismic:seismic123@postgres:5432/seismic
      WINDOW_SIZE: "128"
      SAMPLING_RATE_HZ: "20"
      ANALYZE_EVERY: "32"
      MIN_ANALYSIS_FREQ_HZ: "0.5"
      AMPLITUDE_THRESHOLD: "0.01"
      SNR_THRESHOLD: "1.2"
      TIME_BUCKET_SECONDS: "5"
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    restart: always

  # ─── Gateway (entry point) ─────────────────────────────────
  gateway:
    build: ./gateway
    environment:
      PROCESSOR_URLS: http://processor-1:9001,http://processor-2:9001,http://processor-3:9001
      HEALTH_CHECK_INTERVAL: "5"
      DATABASE_URL: postgresql://seismic:seismic123@postgres:5432/seismic
      KEY_HASH_SECRET: camera-cafe-secret
      BOOTSTRAP_ADMIN_KEY: admin-camera-cafe-dev
    depends_on:
      postgres:
        condition: service_healthy
      processor-1:
        condition: service_started
      processor-2:
        condition: service_started
      processor-3:
        condition: service_started
    ports:
      - "8081:8081"

  # ─── Frontend Dashboard ────────────────────────────────────
  frontend:
    build: ./frontend
    depends_on:
      - gateway
    ports:
      - "3000:80"

volumes:
  postgres_data:
