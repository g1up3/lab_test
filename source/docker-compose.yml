services:

  # ─── Provided Simulator ─────────────────────────────────────
  simulator:
    image: seismic-signal-simulator:multiarch_v1
    ports:
      - "8080:8080"
    environment:
      SAMPLING_RATE_HZ: "20"
      AUTO_SHUTDOWN_ENABLED: "true"
      AUTO_SHUTDOWN_MIN_SECONDS: "30"
      AUTO_SHUTDOWN_MAX_SECONDS: "90"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8080/health', timeout=3); sys.exit(0)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - processing_region

  # ─── Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seismic
      POSTGRES_USER: seismic
      POSTGRES_PASSWORD: seismic123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seismic -d seismic"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    networks:
      - processing_region

  # ─── Broker (fan-out, neutral region) ───────────────────────
  broker:
    build: ./broker
    environment:
      SIMULATOR_URL: http://simulator:8080
    depends_on:
      simulator:
        condition: service_healthy
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:9000/health', timeout=3); sys.exit(0)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neutral_region
      - processing_region

  # ─── Processing Replicas (subject to failure) ───────────────
  processor-1:
    build: ./processor
    environment:
      REPLICA_ID: processor-1
      BROKER_URL: ws://broker:9000/ws/subscribe
      SIMULATOR_URL: http://simulator:8080
      DATABASE_URL: postgresql://seismic:seismic123@postgres:5432/seismic
      WINDOW_SIZE: "128"
      SAMPLING_RATE_HZ: "20"
      ANALYZE_EVERY: "32"
      MIN_ANALYSIS_FREQ_HZ: "0.5"
      AMPLITUDE_THRESHOLD: "0.01"
      SNR_THRESHOLD: "1.2"
      TIME_BUCKET_SECONDS: "5"
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    restart: always
    networks:
      - processing_region

  processor-2:
    build: ./processor
    environment:
      REPLICA_ID: processor-2
      BROKER_URL: ws://broker:9000/ws/subscribe
      SIMULATOR_URL: http://simulator:8080
      DATABASE_URL: postgresql://seismic:seismic123@postgres:5432/seismic
      WINDOW_SIZE: "128"
      SAMPLING_RATE_HZ: "20"
      ANALYZE_EVERY: "32"
      MIN_ANALYSIS_FREQ_HZ: "0.5"
      AMPLITUDE_THRESHOLD: "0.01"
      SNR_THRESHOLD: "1.2"
      TIME_BUCKET_SECONDS: "5"
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    restart: always
    networks:
      - processing_region

  processor-3:
    build: ./processor
    environment:
      REPLICA_ID: processor-3
      BROKER_URL: ws://broker:9000/ws/subscribe
      SIMULATOR_URL: http://simulator:8080
      DATABASE_URL: postgresql://seismic:seismic123@postgres:5432/seismic
      WINDOW_SIZE: "128"
      SAMPLING_RATE_HZ: "20"
      ANALYZE_EVERY: "32"
      MIN_ANALYSIS_FREQ_HZ: "0.5"
      AMPLITUDE_THRESHOLD: "0.01"
      SNR_THRESHOLD: "1.2"
      TIME_BUCKET_SECONDS: "5"
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    restart: always
    networks:
      - processing_region

  # ─── Gateway (entry point) ─────────────────────────────────
  gateway:
    build: ./gateway
    environment:
      PROCESSOR_URLS: http://processor-1:9001,http://processor-2:9001,http://processor-3:9001
      HEALTH_CHECK_INTERVAL: "1"
      HEALTH_CHECK_TIMEOUT: "1.5"
      DATABASE_URL: postgresql://seismic:seismic123@postgres:5432/seismic
      KEY_HASH_SECRET: camera-cafe-secret
      BOOTSTRAP_ADMIN_KEY: admin-camera-cafe-dev
    depends_on:
      postgres:
        condition: service_healthy
      processor-1:
        condition: service_started
      processor-2:
        condition: service_started
      processor-3:
        condition: service_started
    ports:
      - "8081:8081"
    networks:
      - neutral_region
      - processing_region

  # ─── Frontend Dashboard ────────────────────────────────────
  frontend:
    build: ./frontend
    depends_on:
      - gateway
    ports:
      - "3000:80"
    networks:
      - neutral_region

volumes:
  postgres_data:

networks:
  # Services hosted in the neutral region: forwarding/routing only.
  neutral_region:
    name: camera_cafe_neutral_region

  # External processing/data region: intelligence analysis + persistence.
  processing_region:
    name: camera_cafe_processing_region
